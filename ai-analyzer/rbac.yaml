apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-analyzer
  namespace: self-healing

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-analyzer-role
  namespace: self-healing

rules:

- apiGroups: [""]
  resources:
  - pods
  verbs:
  - get
  - list
  - delete

- apiGroups: [""]
  resources:
  - pods/log
  verbs:
  - get

- apiGroups: ["apps"]
  resources:
  - deployments
  verbs:
  - get
  - list
  - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-analyzer-binding
  namespace: self-healing

subjects:
- kind: ServiceAccount
  name: ai-analyzer

roleRef:
  kind: Role
  name: ai-analyzer-role
  apiGroup: rbac.authorization.k8s.io
